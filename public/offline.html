<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#09090b" />
    <title>Notescape is offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #09090b;
        color: #f4f4f5;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(420px, 100%);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        background: rgba(24, 24, 27, 0.72);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.3);
        padding: 28px;
      }

      .icon {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        display: grid;
        place-items: center;
        background: #f4f4f5;
        color: #09090b;
        font-weight: 800;
        margin-bottom: 20px;
      }

      h1 {
        font-size: 24px;
        line-height: 1.15;
        margin: 0 0 10px;
      }

      p {
        color: #a1a1aa;
        line-height: 1.6;
        margin: 0;
      }

      a {
        display: inline-flex;
        margin-top: 22px;
        color: #09090b;
        background: #f4f4f5;
        border-radius: 10px;
        padding: 10px 14px;
        text-decoration: none;
        font-size: 14px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="icon">N</div>
      <h1>You are offline</h1>
      <p>Notescape is installed, but this page was not available in the offline cache yet. Reconnect and open your workspace once to refresh the local shell.</p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>
